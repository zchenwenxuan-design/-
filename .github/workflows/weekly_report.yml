name: Weekly Feishu Report
on:
  schedule:
    - cron: '0 9 * * 5'
  workflow_dispatch:
jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r dangkou-upload/requirements.txt
      - name: Run report script
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID || 'oc_214e828c8acf75a362ca87df4e96eb2e' }}
        run: python dangkou-upload/weekly_push_http.py
