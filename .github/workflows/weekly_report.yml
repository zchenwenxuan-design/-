name: Weekly Feishu Report

on:
  schedule:
    # 每周五 17:00（北京时间）= UTC 09:00
    - cron: '0 9 * * 5'
  workflow_dispatch:

jobs:
  # 档口招商周报
  stall-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r dangkou-upload/requirements.txt
      - name: Run stall report
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID || 'oc_214e828c8acf75a362ca87df4e96eb2e' }}
        run: python dangkou-upload/weekly_push_http.py

  # 青菜价格异常预警周报
  vegetable-report:
    needs: stall-report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests
      - name: Run vegetable report
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID || 'oc_214e828c8acf75a362ca87df4e96eb2e' }}
        run: python vegetable_weekly_push.py
